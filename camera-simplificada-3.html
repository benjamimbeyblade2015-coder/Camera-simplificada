<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Câmera Compartilhada</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #141414; --border: #222;
      --accent: #00e5ff; --accent-dim: rgba(0,229,255,0.12);
      --text: #f0f0f0; --muted: #666; --danger: #ff4444; --green: #00e676;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100dvh; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* SELEÇÃO */
    #screen-select {
      display: flex; flex-direction: column; align-items: center;
      gap: 32px; padding: 32px 24px; width: 100%; max-width: 420px;
    }
    .logo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: var(--accent-dim); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 26px;
    }
    .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
    .logo p { font-size: 13px; color: var(--muted); font-weight: 300; }
    .room-section { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .room-label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
    .room-input-wrap { display: flex; gap: 8px; align-items: center; }
    #room-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 600; letter-spacing: 2px;
      padding: 14px 16px; outline: none; text-align: center;
      text-transform: uppercase; transition: border-color 0.2s;
    }
    #room-input::placeholder { color: var(--muted); letter-spacing: 1px; font-weight: 300; }
    #room-input:focus { border-color: var(--accent); }
    .btn-gen {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 14px; transition: all 0.2s;
    }
    .btn-gen:hover { border-color: var(--accent); color: var(--accent); }
    .role-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
    .role-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; cursor: pointer; display: flex;
      flex-direction: column; align-items: center; gap: 12px;
      padding: 28px 16px; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .role-card:hover, .role-card:active { border-color: var(--accent); background: var(--accent-dim); }
    .role-card .icon { font-size: 36px; line-height: 1; }
    .role-card .name { font-size: 14px; font-weight: 700; }
    .role-card .desc { font-size: 11px; color: var(--muted); text-align: center; line-height: 1.5; }

    /* LOADING */
    #screen-loading {
      display: none; flex-direction: column;
      align-items: center; gap: 20px; text-align: center; padding: 32px;
    }
    .spinner {
      width: 48px; height: 48px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-title { font-size: 18px; font-weight: 700; }
    #loading-sub { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.6; }

    /* CÂMERA */
    #screen-camera {
      display: none; width: 100%; height: 100dvh;
      position: relative; background: #000;
    }
    #local-video, #remote-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #remote-video { object-fit: contain; background: #000; }
    .hidden { display: none !important; }

    .corner { position: absolute; width: 20px; height: 20px; border-color: var(--accent); border-style: solid; opacity: 0.7; }
    .corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 5;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; backdrop-filter: blur(8px);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.live { background: var(--danger); animation: pulse 1.5s infinite; }
    .status-dot.connected { background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .room-badge {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 6px 12px;
      font-size: 11px; color: var(--muted); backdrop-filter: blur(8px);
      letter-spacing: 1px; font-weight: 600;
    }

    .waiting-badge {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.75); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px 28px;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; backdrop-filter: blur(12px); text-align: center; z-index: 5;
    }
    .waiting-badge .icon { font-size: 28px; }
    .waiting-badge .title { font-size: 14px; font-weight: 700; }
    .waiting-badge .sub { font-size: 12px; color: var(--muted); }
    .waiting-badge .code { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--accent); margin-top: 4px; }

    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 24px 20px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      z-index: 5;
    }
    .btn-action {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%; color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; width: 52px; height: 52px;
      backdrop-filter: blur(8px); transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-stop {
      background: var(--danger); border: none; border-radius: 50%; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 20px; width: 64px; height: 64px; transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #tap-to-play {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: rgba(0,0,0,0.7); cursor: pointer; z-index: 10;
    }
  </style>
</head>
<body>

<!-- SELEÇÃO -->
<div id="screen-select">
  <div class="logo">
    <div class="logo-icon">📡</div>
    <h1>Câmera ao Vivo</h1>
    <p>Compartilhe sua câmera em tempo real</p>
  </div>
  <div class="room-section">
    <span class="room-label">Código da sala</span>
    <div class="room-input-wrap">
      <input id="room-input" type="text" maxlength="6" placeholder="EX: ABC123" />
      <button class="btn-gen" onclick="genRoom()">🎲</button>
    </div>
  </div>
  <div class="role-cards">
    <div class="role-card" onclick="startAs('camera')">
      <div class="icon">📷</div>
      <div class="name">Sou a câmera</div>
      <div class="desc">Transmite o vídeo ao vivo</div>
    </div>
    <div class="role-card" onclick="startAs('viewer')">
      <div class="icon">👁️</div>
      <div class="name">Quero ver</div>
      <div class="desc">Recebe o vídeo em tempo real</div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="screen-loading">
  <div class="spinner"></div>
  <div id="loading-title">Conectando...</div>
  <div id="loading-sub"></div>
</div>

<!-- CÂMERA -->
<div id="screen-camera">
  <video id="local-video" autoplay muted playsinline webkit-playsinline></video>
  <video id="remote-video" autoplay playsinline webkit-playsinline class="hidden"></video>

  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <div class="top-bar">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Aguardando...</span>
    </div>
    <div class="room-badge" id="room-badge"></div>
  </div>

  <div class="waiting-badge" id="viewer-waiting" style="display:none;">
    <div class="icon">📡</div>
    <div class="title">Câmera ativa</div>
    <div class="sub">Compartilhe este código:</div>
    <div class="code" id="share-code"></div>
  </div>

  <div id="tap-to-play" onclick="tapToPlay()">
    <div style="font-size:52px;">▶️</div>
    <div style="font-size:15px;font-weight:700;color:#fff;">Toque para iniciar</div>
  </div>

  <div class="bottom-bar">
    <button class="btn-action" id="btn-flip" onclick="flipCamera()">🔄</button>
    <button class="btn-stop" onclick="stopSession()">⏹</button>
    <button class="btn-action" id="btn-torch" onclick="toggleTorch()">🔦</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getDatabase, ref, set, onValue, push, onChildAdded, remove, off
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA4q-nElyrjdP7Z4vVcZZ_0rm5tWM8lnQU",
  authDomain: "camera-simplificada.firebaseapp.com",
  projectId: "camera-simplificada",
  storageBucket: "camera-simplificada.firebasestorage.app",
  messagingSenderId: "572493196935",
  appId: "1:572493196935:web:df074d2e1fc4bfb69a9222",
  databaseURL: "https://camera-simplificada-default-rtdb.firebaseio.com"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const ICE = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun2.l.google.com:19302' },
]};

let role = null, roomId = null, pc = null, localStream = null;
let facingMode = 'environment', torchOn = false, torchTrack = null;

// ── HELPERS UI ──
const $ = id => document.getElementById(id);

function showScreen(name) {
  ['screen-select','screen-loading','screen-camera'].forEach(s => {
    $(s).style.display = s === name ? (name === 'screen-camera' ? 'block' : 'flex') : 'none';
  });
}

function setLoading(title, sub='') {
  showScreen('screen-loading');
  $('loading-title').textContent = title;
  $('loading-sub').textContent = sub;
}

function setStatus(type, text) {
  $('status-dot').className = 'status-dot' + (type ? ' '+type : '');
  $('status-text').textContent = text;
}

// ── GERAR CÓDIGO ──
window.genRoom = () => {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  $('room-input').value = Array.from({length:6}, () => c[Math.floor(Math.random()*c.length)]).join('');
};

// ── INICIAR ──
window.startAs = async (r) => {
  const code = $('room-input').value.trim().toUpperCase();
  if (code.length < 4) { alert('Digite um código (mínimo 4 caracteres)'); return; }
  role = r; roomId = code;
  if (role === 'camera') await startCamera();
  else await startViewer();
};

// ══════════════════════════════════════
// CÂMERA (answerer)
// Fluxo: abre câmera → limpa sala → fica escutando offer do viewer
// ══════════════════════════════════════
async function startCamera() {
  setLoading('Iniciando câmera...');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
  } catch(e) {
    alert('Erro ao acessar câmera: ' + e.message);
    goBack(); return;
  }

  torchTrack = localStream.getVideoTracks()[0];
  $('local-video').srcObject = localStream;
  $('local-video').classList.remove('hidden');
  $('remote-video').classList.add('hidden');

  // Limpar sala antiga
  await remove(ref(db, `rooms/${roomId}`));

  showScreen('screen-camera');
  $('room-badge').textContent = roomId;
  $('btn-flip').style.display = 'flex';
  $('btn-torch').style.display = 'flex';
  $('viewer-waiting').style.display = 'flex';
  $('share-code').textContent = roomId;
  setStatus('live', 'AO VIVO');

  // Escutar offer do viewer
  const offerRef = ref(db, `rooms/${roomId}/offer`);
  onValue(offerRef, async snap => {
    if (!snap.exists()) return;
    off(offerRef); // parar de escutar
    await handleOffer(snap.val());
  });
}

async function handleOffer(offer) {
  $('viewer-waiting').style.display = 'none';
  setStatus('', 'Conectando...');

  // Fechar PC anterior se existir
  if (pc) { pc.close(); pc = null; }

  pc = new RTCPeerConnection(ICE);

  // Adicionar tracks ANTES de setRemoteDescription
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = async e => {
    if (e.candidate) {
      await push(ref(db, `rooms/${roomId}/answerCandidates`), e.candidate.toJSON());
    }
  };

  pc.onconnectionstatechange = () => {
    console.log('[camera] connectionState:', pc.connectionState);
    if (pc.connectionState === 'connected') setStatus('live', 'CONECTADO');
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      setStatus('live', 'AO VIVO');
      $('viewer-waiting').style.display = 'flex';
      // Reescutar offer para próxima conexão
      const offerRef = ref(db, `rooms/${roomId}/offer`);
      onValue(offerRef, async snap => {
        if (!snap.exists()) return;
        off(offerRef);
        await handleOffer(snap.val());
      });
    }
  };

  await pc.setRemoteDescription(new RTCSessionDescription(offer));

  // Escutar ICE candidates do viewer
  const offerCandRef = ref(db, `rooms/${roomId}/offerCandidates`);
  onChildAdded(offerCandRef, snap => {
    pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(console.warn);
  });

  // Criar answer
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await set(ref(db, `rooms/${roomId}/answer`), { type: answer.type, sdp: answer.sdp });

  console.log('[camera] answer enviado');
}

// ══════════════════════════════════════
// VIEWER (offerer)
// Fluxo: cria PC → cria offer → salva no Firebase → escuta answer
// ══════════════════════════════════════
async function startViewer() {
  setLoading('Conectando à câmera...', `Sala: ${roomId}`);

  // Limpar sinalizações antigas desta sala (do lado viewer)
  await remove(ref(db, `rooms/${roomId}/offer`));
  await remove(ref(db, `rooms/${roomId}/answer`));
  await remove(ref(db, `rooms/${roomId}/offerCandidates`));
  await remove(ref(db, `rooms/${roomId}/answerCandidates`));

  pc = new RTCPeerConnection(ICE);

  pc.ontrack = e => {
    console.log('[viewer] ontrack recebido', e.streams);
    const rv = $('remote-video');
    rv.srcObject = e.streams[0];
    rv.classList.remove('hidden');
    $('local-video').classList.add('hidden');
    rv.play().catch(() => { $('tap-to-play').style.display = 'flex'; });
    setStatus('connected', 'RECEBENDO');
  };

  pc.onicecandidate = async e => {
    if (e.candidate) {
      await push(ref(db, `rooms/${roomId}/offerCandidates`), e.candidate.toJSON());
    }
  };

  pc.onconnectionstatechange = () => {
    console.log('[viewer] connectionState:', pc.connectionState);
    if (pc.connectionState === 'connected') setStatus('connected', 'RECEBENDO');
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      setStatus('', 'Câmera desconectou');
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log('[viewer] iceConnectionState:', pc.iceConnectionState);
  };

  // Adicionar transceiver para receber vídeo
  pc.addTransceiver('video', { direction: 'recvonly' });

  // Criar offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await set(ref(db, `rooms/${roomId}/offer`), { type: offer.type, sdp: offer.sdp });
  console.log('[viewer] offer enviado');

  // Escutar answer
  const answerRef = ref(db, `rooms/${roomId}/answer`);
  onValue(answerRef, async snap => {
    if (!snap.exists() || pc.currentRemoteDescription) return;
    off(answerRef);
    console.log('[viewer] answer recebido');
    await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
  });

  // Escutar ICE candidates da câmera
  const answerCandRef = ref(db, `rooms/${roomId}/answerCandidates`);
  onChildAdded(answerCandRef, snap => {
    pc.addIceCandidate(new RTCIceCandidate(snap.val())).catch(console.warn);
  });

  showScreen('screen-camera');
  $('room-badge').textContent = roomId;
  $('local-video').classList.add('hidden');
  $('btn-flip').style.display = 'none';
  $('btn-torch').style.display = 'none';
  $('viewer-waiting').style.display = 'none';
  setStatus('', 'Aguardando câmera...');
}

// ── FLIP ──
window.flipCamera = async () => {
  if (!localStream || role !== 'camera') return;
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  localStream.getTracks().forEach(t => t.stop());
  localStream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode, width:{ideal:1280}, height:{ideal:720} }, audio: false
  });
  $('local-video').srcObject = localStream;
  torchTrack = localStream.getVideoTracks()[0];
  if (pc) {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender) await sender.replaceTrack(localStream.getVideoTracks()[0]);
  }
};

// ── LANTERNA ──
window.toggleTorch = async () => {
  if (!torchTrack) return;
  try {
    torchOn = !torchOn;
    await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
    $('btn-torch').style.opacity = torchOn ? '1' : '0.5';
  } catch(e) {
    alert('Lanterna não disponível'); torchOn = false;
  }
};

// ── TAP TO PLAY ──
window.tapToPlay = () => {
  $('remote-video').play();
  $('tap-to-play').style.display = 'none';
};

// ── STOP ──
window.stopSession = async () => {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (pc) { pc.close(); pc = null; }
  if (role === 'camera') await remove(ref(db, `rooms/${roomId}`));
  goBack();
};

function goBack() {
  showScreen('screen-select');
  setStatus('', 'Aguardando...');
  role = null; roomId = null; localStream = null;
  $('local-video').srcObject = null;
  $('remote-video').srcObject = null;
  $('remote-video').classList.add('hidden');
  $('local-video').classList.remove('hidden');
  $('tap-to-play').style.display = 'none';
}
</script>
</body>
</html>
