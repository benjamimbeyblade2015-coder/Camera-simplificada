<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Câmera Compartilhada</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #222;
      --accent: #00e5ff;
      --accent-dim: rgba(0,229,255,0.12);
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4444;
      --green: #00e676;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── TELA DE SELEÇÃO ── */
    #screen-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
    }

    .logo h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .logo p {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .room-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .room-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .room-input-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #room-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 14px 16px;
      outline: none;
      text-align: center;
      text-transform: uppercase;
      transition: border-color 0.2s;
    }

    #room-input::placeholder { color: var(--muted); letter-spacing: 1px; font-weight: 300; }
    #room-input:focus { border-color: var(--accent); }

    .btn-gen {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 14px 14px;
      transition: all 0.2s;
    }
    .btn-gen:hover { border-color: var(--accent); color: var(--accent); }

    .role-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .role-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 16px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .role-card:hover, .role-card:active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .role-card .icon {
      font-size: 36px;
      line-height: 1;
    }

    .role-card .name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .role-card .desc {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── TELA DE CÂMERA ── */
    #screen-camera {
      display: none;
      width: 100%;
      height: 100dvh;
      position: relative;
      background: #000;
    }

    #local-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Cantos decorativos */
    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--accent);
      border-style: solid;
      opacity: 0.7;
    }
    .corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      pointer-events: all;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.live { background: var(--danger); animation: pulse 1.5s infinite; }
    .status-dot.connected { background: var(--green); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .room-badge {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 11px;
      color: var(--muted);
      backdrop-filter: blur(8px);
      letter-spacing: 1px;
      font-weight: 600;
    }

    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px 20px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      pointer-events: all;
    }

    .btn-action {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      width: 52px;
      height: 52px;
      backdrop-filter: blur(8px);
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-action:hover, .btn-action:active {
      background: rgba(255,255,255,0.22);
    }

    .btn-stop {
      background: var(--danger);
      border: none;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      width: 64px;
      height: 64px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-stop:hover, .btn-stop:active { opacity: 0.85; transform: scale(0.96); }

    /* ── LOADING / STATUS ── */
    #screen-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
      padding: 32px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-title { font-size: 18px; font-weight: 700; }
    #loading-sub { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.6; }

    /* ── AGUARDANDO VIEWER ── */
    .waiting-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
      text-align: center;
    }
    .waiting-badge .icon { font-size: 28px; }
    .waiting-badge .title { font-size: 14px; font-weight: 700; }
    .waiting-badge .sub { font-size: 12px; color: var(--muted); }
    .waiting-badge .code {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--accent);
      margin-top: 4px;
    }

    #viewer-waiting { display: none; }

    /* HIDDEN */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- TELA DE SELEÇÃO -->
<div id="screen-select">
  <div class="logo">
    <div class="logo-icon">📡</div>
    <h1>Câmera ao Vivo</h1>
    <p>Compartilhe sua câmera em tempo real</p>
  </div>

  <div class="room-section">
    <span class="room-label">Código da sala</span>
    <div class="room-input-wrap">
      <input id="room-input" type="text" maxlength="6" placeholder="EX: ABC123" />
      <button class="btn-gen" onclick="genRoom()" title="Gerar código">🎲</button>
    </div>
  </div>

  <div class="role-cards">
    <div class="role-card" onclick="startAs('camera')">
      <div class="icon">📷</div>
      <div class="name">Sou a câmera</div>
      <div class="desc">Transmite o vídeo ao vivo</div>
    </div>
    <div class="role-card" onclick="startAs('viewer')">
      <div class="icon">👁️</div>
      <div class="name">Quero ver</div>
      <div class="desc">Recebe o vídeo em tempo real</div>
    </div>
  </div>
</div>

<!-- TELA DE LOADING -->
<div id="screen-loading">
  <div class="spinner"></div>
  <div id="loading-title">Conectando...</div>
  <div id="loading-sub">Aguarde um momento</div>
</div>

<!-- TELA DE CÂMERA -->
<div id="screen-camera">
  <video id="local-video" autoplay muted playsinline webkit-playsinline style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;"></video>
  <video id="remote-video" autoplay playsinline webkit-playsinline class="hidden" style="width:100%;height:100%;object-fit:contain;background:#000;position:absolute;inset:0;"></video>

  <div class="camera-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>

  <div class="top-bar">
    <div class="status-pill">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Aguardando...</span>
    </div>
    <div class="room-badge" id="room-badge"></div>
  </div>

  <!-- Aguardando viewer (só aparece pra câmera) -->
  <div class="waiting-badge" id="viewer-waiting">
    <div class="icon">📡</div>
    <div class="title">Câmera ativa</div>
    <div class="sub">Compartilhe este código com quem vai assistir:</div>
    <div class="code" id="share-code"></div>
  </div>

  <!-- Tap to play fallback -->
  <div id="tap-to-play" onclick="tapToPlay()" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; flex-direction:column; gap:12px; background:rgba(0,0,0,0.6); cursor:pointer; z-index:10;">
    <div style="font-size:52px;">▶️</div>
    <div style="font-size:15px; font-weight:700; color:#fff;">Toque para iniciar o vídeo</div>
  </div>

  <div class="bottom-bar">
    <button class="btn-action" id="btn-flip" onclick="flipCamera()" title="Virar câmera">🔄</button>
    <button class="btn-stop" onclick="stopSession()">⏹</button>
    <button class="btn-action" id="btn-torch" onclick="toggleTorch()" title="Lanterna">🔦</button>
  </div>
</div>

<!-- Firebase + WebRTC -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getDatabase, ref, set, get, onValue, push, onChildAdded, remove
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── CONFIG ──
  const firebaseConfig = {
    apiKey: "AIzaSyA4q-nElyrjdP7Z4vVcZZ_0rm5tWM8lnQU",
    authDomain: "camera-simplificada.firebaseapp.com",
    projectId: "camera-simplificada",
    storageBucket: "camera-simplificada.firebasestorage.app",
    messagingSenderId: "572493196935",
    appId: "1:572493196935:web:df074d2e1fc4bfb69a9222",
    databaseURL: "https://camera-simplificada-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ── ESTADO ──
  let role = null;
  let roomId = null;
  let pc = null;
  let localStream = null;
  let facingMode = 'environment';
  let torchOn = false;
  let torchTrack = null;

  const ICE_SERVERS = {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]
  };

  // ── UI ──
  window.genRoom = () => {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
    document.getElementById('room-input').value = code;
  };

  window.startAs = async (r) => {
    const code = document.getElementById('room-input').value.trim().toUpperCase();
    if (code.length < 4) { alert('Digite um código de sala (mínimo 4 caracteres)'); return; }
    role = r;
    roomId = code;
    showLoading(role === 'camera' ? 'Iniciando câmera...' : 'Conectando à câmera...');

    if (role === 'camera') await startCamera();
    else await startViewer();
  };

  function showLoading(title, sub = '') {
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'flex';
    document.getElementById('screen-camera').style.display = 'none';
    document.getElementById('loading-title').textContent = title;
    document.getElementById('loading-sub').textContent = sub;
  }

  function showCameraScreen() {
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-camera').style.display = 'block';
    document.getElementById('room-badge').textContent = roomId;
  }

  function setStatus(type, text) {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-text');
    dot.className = 'status-dot' + (type ? ' ' + type : '');
    label.textContent = text;
  }

  // ── CÂMERA ──
  async function startCamera() {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      document.getElementById('local-video').srcObject = localStream;
      torchTrack = localStream.getVideoTracks()[0];
      showCameraScreen();
      document.getElementById('btn-flip').style.display = 'flex';
      document.getElementById('btn-torch').style.display = 'flex';
      document.getElementById('viewer-waiting').style.display = 'flex';
      document.getElementById('share-code').textContent = roomId;
      setStatus('live', 'AO VIVO');
      await cleanRoom();
      await waitForViewer();
    } catch (e) {
      alert('Erro ao acessar câmera: ' + e.message);
      goBack();
    }
  }

  async function cleanRoom() {
    await remove(ref(db, `rooms/${roomId}`));
  }

  async function waitForViewer() {
    // Aguarda o viewer criar o offer
    const offerRef = ref(db, `rooms/${roomId}/offer`);
    onValue(offerRef, async (snap) => {
      if (!snap.exists()) return;
      const offer = snap.val();
      await createAnswerer(offer);
    }, { onlyOnce: true });
  }

  async function createAnswerer(offer) {
    document.getElementById('viewer-waiting').style.display = 'none';
    setStatus('', 'Conectando...');
    pc = new RTCPeerConnection(ICE_SERVERS);

    // Adicionar tracks locais
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    // ICE candidates do answerer → Firebase
    pc.onicecandidate = async (e) => {
      if (e.candidate) {
        await push(ref(db, `rooms/${roomId}/answerCandidates`), e.candidate.toJSON());
      }
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') setStatus('live', 'CONECTADO');
      if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
        setStatus('', 'Viewer desconectou');
        document.getElementById('viewer-waiting').style.display = 'flex';
      }
    };

    await pc.setRemoteDescription(new RTCSessionDescription(offer));

    // Candidatos do offerer (viewer)
    const offerCandRef = ref(db, `rooms/${roomId}/offerCandidates`);
    onChildAdded(offerCandRef, (snap) => {
      pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await set(ref(db, `rooms/${roomId}/answer`), { type: answer.type, sdp: answer.sdp });
  }

  // ── VIEWER ──
  async function startViewer() {
    // Mostrar tela de câmera ANTES de tudo para o video element existir no DOM
    showCameraScreen();
    setStatus('', 'Aguardando câmera...');
    document.getElementById('btn-flip').style.display = 'none';
    document.getElementById('btn-torch').style.display = 'none';
    document.getElementById('viewer-waiting').style.display = 'none';

    // Esconder video local, mostrar remote (já no DOM agora)
    document.getElementById('local-video').classList.add('hidden');
    document.getElementById('remote-video').classList.remove('hidden');

    pc = new RTCPeerConnection(ICE_SERVERS);

    pc.ontrack = (e) => {
      const remoteVideo = document.getElementById('remote-video');
      if (remoteVideo.srcObject !== e.streams[0]) {
        remoteVideo.srcObject = e.streams[0];
      }
      // Tentar dar play — se o autoplay bloquear, mostrar botão
      remoteVideo.play().catch(() => {
        document.getElementById('tap-to-play').style.display = 'flex';
      });
      setStatus('connected', 'RECEBENDO');
    };

    pc.onicecandidate = async (e) => {
      if (e.candidate) {
        await push(ref(db, `rooms/${roomId}/offerCandidates`), e.candidate.toJSON());
      }
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') {
        setStatus('connected', 'RECEBENDO');
      }
      if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
        setStatus('', 'Câmera desconectou');
      }
    };

    // Criar offer
    const offer = await pc.createOffer({ offerToReceiveVideo: true });
    await pc.setLocalDescription(offer);
    await set(ref(db, `rooms/${roomId}/offer`), { type: offer.type, sdp: offer.sdp });

    // Aguardar answer
    const answerRef = ref(db, `rooms/${roomId}/answer`);
    onValue(answerRef, async (snap) => {
      if (!snap.exists() || pc.currentRemoteDescription) return;
      const answer = snap.val();
      await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });

    // Candidatos do answerer (câmera)
    const answerCandRef = ref(db, `rooms/${roomId}/answerCandidates`);
    onChildAdded(answerCandRef, (snap) => {
      pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    });
  }

  // Tap to play fallback
  window.tapToPlay = () => {
    const v = document.getElementById('remote-video');
    v.play();
    document.getElementById('tap-to-play').style.display = 'none';
  };

  // ── FLIP CÂMERA ──
  window.flipCamera = async () => {
    if (!localStream || role !== 'camera') return;
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    localStream.getTracks().forEach(t => t.stop());
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    document.getElementById('local-video').srcObject = localStream;
    torchTrack = localStream.getVideoTracks()[0];
    if (pc) {
      const sender = pc.getSenders().find(s => s.track?.kind === 'video');
      if (sender) sender.replaceTrack(localStream.getVideoTracks()[0]);
    }
  };

  // ── LANTERNA ──
  window.toggleTorch = async () => {
    if (!torchTrack) return;
    try {
      torchOn = !torchOn;
      await torchTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
      document.getElementById('btn-torch').style.opacity = torchOn ? '1' : '0.5';
    } catch (e) {
      alert('Lanterna não disponível neste dispositivo');
      torchOn = false;
    }
  };

  // ── STOP ──
  window.stopSession = async () => {
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (pc) { pc.close(); pc = null; }
    if (role === 'camera') await remove(ref(db, `rooms/${roomId}`));
    goBack();
  };

  function goBack() {
    document.getElementById('screen-camera').style.display = 'none';
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('screen-select').style.display = 'flex';
    setStatus('', 'Aguardando...');
    role = null; roomId = null; localStream = null;
    document.getElementById('local-video').srcObject = null;
    document.getElementById('remote-video').srcObject = null;
    document.getElementById('remote-video').classList.add('hidden');
    document.getElementById('local-video').classList.remove('hidden');
  }
</script>
</body>
</html>
